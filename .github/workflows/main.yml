name: Build Philips feed

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Run script
        env:
          ALSO_USER: ${{ secrets.ALSO_USER }}
          ALSO_PASS: ${{ secrets.ALSO_PASS }}
        run: php scripts/build_feed.php

      - name: Commit feed.xml
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/feed.xml
          git diff --cached --quiet || git commit -m "Update feed"
          git push
